version = 1
revision = 3
requires-python = ">=3.13"

[manifest]
members = [
    "neobot",
    "neobot-adapter",
    "neobot-app",
    "neobot-chat",
    "neobot-memory",
    "neobot-modloader",
]

[[package]]
name = "neobot"
version = "0.1.0"
source = { virtual = "." }

[[package]]
name = "neobot-adapter"
version = "0.1.0"
source = { editable = "packages/adapter" }

[[package]]
name = "neobot-app"
version = "0.1.0"
source = { editable = "app" }

[[package]]
name = "neobot-chat"
version = "0.1.0"
source = { editable = "packages/chat" }

[[package]]
name = "neobot-memory"
version = "0.1.0"
source = { editable = "packages/memory" }

[[package]]
name = "neobot-modloader"
version = "0.1.0"
source = { editable = "packages/modloader" }
